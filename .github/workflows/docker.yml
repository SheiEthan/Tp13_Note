name: Docker Build, Scan & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA et image name
        id: meta
        run: |
          echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/mon-api" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          load: true
          tags: ${{ steps.meta.outputs.image }}:git-${{ steps.meta.outputs.short }}

      - name: Scan Trivy — échec si CVE CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}:git-${{ steps.meta.outputs.short }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push image vers GHCR
        run: docker push ${{ steps.meta.outputs.image }}:git-${{ steps.meta.outputs.short }}
